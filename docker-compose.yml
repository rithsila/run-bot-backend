# run-bot-api self-hosted stack (Run Bot telemetry/commands backend).
#
# Single service only — NO local database, NO Redis, NO BullMQ.
# MongoDB is hosted in the cloud (e.g. MongoDB Atlas).
#
# Cloudflare Tunnel fronts this stack with HTTPS (see README.md).
# Point cloudflared at http://127.0.0.1:${PORT}.

services:
    run-bot-api:
        build:
            context: .
            dockerfile: Dockerfile
        restart: unless-stopped
        environment:
            NODE_ENV: production
            PORT: ${PORT:-4000}
            # CORS allowlist — the SafetyScore web domain (and the browser origin).
            FRONTEND_URL: ${FRONTEND_URL:?set FRONTEND_URL (SafetyScore web origin)}
            # Cloud MongoDB URI.
            MONGO_URI: ${MONGO_URI:?set MONGO_URI (MongoDB Atlas URI)}
            # ES256 public key used to VERIFY SafetyScore-signed tokens.
            # Raw PEM or base64-encoded PEM.
            SAFETYSCORE_TOKEN_PUBLIC_KEY: ${SAFETYSCORE_TOKEN_PUBLIC_KEY:?set SAFETYSCORE_TOKEN_PUBLIC_KEY (ES256 public key)}
        ports:
            # Bound to loopback so only a host-level cloudflared (or local curl) can reach it.
            - '127.0.0.1:${PORT:-4000}:${PORT:-4000}'
        healthcheck:
            test:
                [
                    'CMD',
                    'node',
                    '-e',
                    "fetch('http://127.0.0.1:'+(process.env.PORT||4000)+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
                ]
            interval: 30s
            timeout: 5s
            start_period: 20s
            retries: 3
