# bhub-api self-hosted stack (Run Bot telemetry/commands backend).
#
# Two services only — NO Redis, NO BullMQ. The app is single-instance and keeps
# its telemetry cache in memory; Mongo is the only durable datastore.
#
# Cloudflare Tunnel fronts this stack with HTTPS (see README.md). cloudflared is
# intentionally NOT defined here — it is wired separately. Two supported shapes:
#   1. cloudflared on the host  -> point it at http://127.0.0.1:${PORT} (the
#      published port below, bound to loopback only).
#   2. cloudflared as a container on this network -> point it at
#      http://bhub-api:${PORT} and you can drop the published port entirely.

services:
    mongo:
        image: mongo:7
        restart: unless-stopped
        # Internal only — never published to the host. Reachable solely by
        # bhub-api over the private compose network.
        volumes:
            - mongo-data:/data/db
        healthcheck:
            test:
                [
                    'CMD',
                    'mongosh',
                    '--quiet',
                    '--eval',
                    "db.adminCommand('ping').ok",
                ]
            interval: 30s
            timeout: 5s
            start_period: 20s
            retries: 5

    bhub-api:
        build:
            context: .
            dockerfile: Dockerfile
        restart: unless-stopped
        depends_on:
            mongo:
                condition: service_healthy
        environment:
            NODE_ENV: production
            PORT: ${PORT:-4000}
            # CORS allowlist — the SafetyScore web domain (and the browser origin).
            FRONTEND_URL: ${FRONTEND_URL:?set FRONTEND_URL (SafetyScore web origin)}
            # The app talks to Mongo over the internal compose network.
            MONGO_URI: mongodb://mongo:27017/bhub
            # ES256 public key used to VERIFY SafetyScore-signed tokens.
            # Raw PEM or base64-encoded PEM.
            SAFETYSCORE_TOKEN_PUBLIC_KEY: ${SAFETYSCORE_TOKEN_PUBLIC_KEY:?set SAFETYSCORE_TOKEN_PUBLIC_KEY (ES256 public key)}
        ports:
            # Bound to loopback so only a host-level cloudflared (or local curl)
            # can reach it. Remove this block if cloudflared joins this network.
            - '127.0.0.1:${PORT:-4000}:${PORT:-4000}'
        healthcheck:
            test:
                [
                    'CMD',
                    'node',
                    '-e',
                    "fetch('http://127.0.0.1:'+(process.env.PORT||4000)+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
                ]
            interval: 30s
            timeout: 5s
            start_period: 20s
            retries: 3

volumes:
    mongo-data:
